<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberssecurity - Login</title>
    <link rel="stylesheet" href="../css/stylesheet.css">
</head>
<body class="auth-page">
    <header>
        <h1>Cybersecurity</h1>
        <p>Cybersecurity Platform</p>
    </header>

    <nav>
        <a href="../cybersecurity/index.html">HOME</a>
        <a href="../cybersecurity/login.html">LOGIN</a>
        <a href="../cybersecurity/course.html">COURSES</a>
    </nav>
    <div class="login-container">
        <div class="logo-section">
            <img src="../media/SECURITY.jfif" alt="Logo">
        </div>

<form id="signup-form" action="/submit-signup" method="POST">
  <h1>Sign Up</h1>
  
  <label for="username">Username</label>
  <input type="text" id="username" name="username" placeholder="Choose a username" required>

  <label for="email">Email</label>
  <input type="email" id="email" name="email" placeholder="Enter your email" required>

  <label for="psw">Password</label>
  <input type="password" id="psw" name="psw" autocomplete="new-password" required minlength="8">
  <label for="psw">confirm password</label>
  <input type="password" id="confirmpassword" name="confirmpassword" autocomplete="Confirm-password" required>

  <button type="submit">register now</button>
  <script src="../js/site.js"></script>
</form>
</body>
</html>
