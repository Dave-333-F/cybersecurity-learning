<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberssecurity - Login</title>
    <style>
        button{
            cursor: pointer;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #2a3942;
            padding: 20px;
        }

        header {
            background: rgb(196, 201, 207);
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            color: #333;
        }

        nav {
            text-align: center;
            margin-bottom: 20px;
        }

        nav a {
            margin: 0 20px;
            text-decoration: none;
            color: #1e1616;
            font-weight: bold;
        }

        .login-container {
            max-width: 400px;
            margin: 0 auto;
            background: rgb(91, 101, 243);
            padding: 30px;
            border: 3px solid #6683a1dd;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-section img {
            height: 80px;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #bebee5;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #072072;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: #5759c7;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #d2d3e7;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Cybersecurity</h1>
        <p>Cybersecurity Platform</p>
    </header>

    <nav>
        <a href="index.html">HOME</a>
        <a href="login.html">LOGIN</a>
        <a href="COURSES">COURSES</a>
    </nav>
    <div class="login-container">
        <div class="logo-section">
            <img src="SECURITY.jfif" alt="Logo">
        </div>

<form action="/submit-signup" method="POST">
  <h1>Sign Up</h1>
  
  <label for="username">Username</label>
  <input type="text" id="username" name="username" placeholder="Choose a username" required>

  <label for="email">Email</label>
  <input type="email" id="email" name="email" placeholder="Enter your email" required>

  <label for="psw">Password</label>
  <input type="password" id="psw" name="psw" autocomplete="new-password" required minlength="8">
  <laber for="psw">confirm password</laber>
  <input type="password" id="confirmpassword" name="confirmpassword" autocomplete="Confirm-password" required>

  <button type="submit"><a href="login.html">Register now </a></button>
 
</form>
