<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybersecurity - Sign Up</title>
    <link rel="stylesheet" href="css/stylesheet.css">
</head>
<body class="auth-page">
    <header>
        <h1>Cybersecurity</h1>
        <p>Cybersecurity Platform</p>
    </header>
    <nav>
        <a href="index.html">HOME</a>
        <a href="login.html">LOGIN</a>
        <a href="course.html">COURSES</a>
    </nav>
    <div class="login-container">
        <div class="logo-section">
            <img src="media/SECURITY.jfif" alt="Logo">
        </div>
        <h2>Sign Up</h2>
        <form id="signup-form" action="/submit-signup" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="psw">Password</label>
                <input type="password" id="psw" name="psw" autocomplete="new-password" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirmpassword">Confirm Password</label>
                <input type="password" id="confirmpassword" name="confirmpassword" autocomplete="new-password" required minlength="8">
            </div>
            <button type="submit">Register Now</button>
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </form>
    </div>
    <footer>
        <p>&copy; 2026 Cybersecurity courses. All rights reserved.</p>
    </footer>
    <script src="js/site.js"></script>
</body>
</html>
